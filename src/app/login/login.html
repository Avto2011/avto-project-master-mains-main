<div class="wrap">
  <div class="card">

    <div class="logo-line">
      <div class="logo-dot"></div>
      <span class="logo-text">myapp</span>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Login to your account</p>

    <form #f="ngForm" (ngSubmit)="login(f.value)">

      <div class="field">
        <label>Email</label>
        <input type="email" name="email" ngModel required />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" name="password" ngModel required />
      </div>

      <button class="btn-register" type="submit" [disabled]="f.invalid">
        Login
      </button>

      <button  routerLink="/register" class="login-link">
        Don’t have an account? Register
      </button>

    </form>

  </div>
</div>
